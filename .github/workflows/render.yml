name: Render & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev \
            libudunits2-dev libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c(
            "tidyverse", "readxl", "writexl", "psych",
            "geobr", "sf", "viridis", "scales", "patchwork",
            "ggrepel", "knitr", "kableExtra", "rmarkdown", "RColorBrewer"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Render Rmd
        run: |
          dir.create("docs",    showWarnings = FALSE)
          dir.create("figures", showWarnings = FALSE)
          dir.create("output",  showWarnings = FALSE)
          rmarkdown::render(
            "ql_estados_brasil.Rmd",
            output_file = "index.html",
            output_dir  = "docs"
          )
        shell: Rscript {0}

      - name: Commit figures back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add figures/
          if git diff --staged --quiet; then
            echo "Nenhuma figura nova."
          else
            git commit -m "chore: atualizar figuras [skip ci]"
            git push origin main
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
